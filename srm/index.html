<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <title>CRM Profesional - Completo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🏢 CRM Profesional <span id="modoOscuroBtn" class="modo-oscuro-toggle">🌙</span></h1>
            <p>Gestión completa de empresas, contactos e interacciones</p>
            <div class="global-search">
                <input type="text" id="globalSearchInput" placeholder="🔍 Buscar...">
                <button onclick="CRM.busquedaGlobal()">Buscar</button>
            </div>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="CRM.cambiarPestana('empresas')">🏭 Empresas</button>
            <button class="nav-tab" onclick="CRM.cambiarPestana('contactos')">👥 Contactos</button>
            <button class="nav-tab" onclick="CRM.cambiarPestana('interacciones')">💬 Interacciones</button>
            <button class="nav-tab" onclick="CRM.cambiarPestana('dashboard')">📊 Dashboard</button>
        </div>
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-primary" id="btnAgregar" onclick="CRM.accionAgregar()">+ Nuevo</button>
                <button class="btn-outline" onclick="CRM.importarExcelCompleto()">📊 Importar Excel</button>
                <button class="btn-outline" onclick="CRM.descargarPlantilla()">📄 Plantilla</button>
            </div>
            <div class="toolbar-right">
                <select id="sortBy" onchange="CRM.cambiarOrden()">
                    <option value="nombre_asc">Nombre A-Z</option>
                    <option value="nombre_desc">Nombre Z-A</option>
                    <option value="fecha_asc">Más antiguos</option>
                    <option value="fecha_desc">Más recientes</option>
                </select>
                <select id="filtroRapido" onchange="CRM.aplicarFiltroRapido()">
                    <option value="todos">Todos</option>
                    <option value="activos">Activos</option>
                    <option value="inactivos">Inactivos</option>
                </select>
                <button class="btn-outline" onclick="CRM.exportarExcel()">📊 Exportar Excel</button>
                <button class="btn-outline" onclick="CRM.exportarPDF()">📄 PDF</button>
                <button class="btn-outline" onclick="CRM.verCalendario()">📅 Calendario</button>
            </div>
        </div>
        <div id="filtrosInteracciones" style="display:none; padding:12px; background:#f8f9fa; gap:8px; flex-wrap:wrap;"></div>
        <div id="contentGridContainer" class="grid-container"></div>
        <div id="dashboardContainer" style="display:none;"></div>
        <div class="pagination" id="pagination"></div>
        <div class="stats" id="stats"></div>
    </div>

    <div id="modalConfirmacion" class="modal"><div class="modal-content"><h2>Confirmar acción</h2><p id="confirmacionMensaje"></p><button onclick="CRM.cerrarModalConfirmacion()">Cancelar</button><button id="confirmarAccionBtn">Aceptar</button></div></div>
    <div id="modalCalendario" class="modal"><div class="modal-content" style="width:90%; max-width:1000px;"><div id="calendar"></div><button onclick="CRM.cerrarModalCalendario()">Cerrar</button></div></div>

    <script src="app.js"></script>
    <script>window.CRM = new CRMApp(); window.CRM.init();</script>
</body>
</html>
