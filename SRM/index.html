<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM con Google Sheets (Auth2)</title>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Todos los estilos que ya tenías (los mismos) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 12px; }
        .app-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px 20px; }
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .header p { font-size: 0.85em; opacity: 0.9; }
        .global-search { background: rgba(255,255,255,0.15); border-radius: 12px; padding: 4px; margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
        .global-search input { flex: 1; padding: 10px 14px; border: none; border-radius: 10px; font-size: 14px; background: rgba(255,255,255,0.95); min-width: 150px; }
        .global-search button { background: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #667eea; }
        .nav-tabs { display: flex; background: #f8f9fa; border-bottom: 2px solid #e0e0e0; }
        .nav-tab { flex: 1; padding: 14px 20px; background: transparent; border: none; font-size: 15px; font-weight: 600; cursor: pointer; color: #666; text-align: center; }
        .nav-tab:hover { background: #f0f0f0; }
        .nav-tab.active { color: #667eea; border-bottom: 3px solid #667eea; background: white; }
        .toolbar { padding: 12px 16px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; display: flex; gap: 10px; flex-wrap: wrap; justify-content: space-between; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid #667eea; color: #667eea; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .btn-danger { background: #f44336; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; display: inline-block; }
        .badge-active { background: #4CAF50; color: white; }
        .badge-inactive { background: #f44336; color: white; }
        .badge-pendiente { background: #ff9800; color: white; }
        .badge-completada { background: #4CAF50; color: white; }
        .card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .grid-container { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; max-height: 55vh; overflow-y: auto; }
        .ficha-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .ficha-container { background: white; border-radius: 20px; width: 100%; max-width: 1200px; max-height: 95vh; overflow-y: auto; }
        .ficha-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 20px 20px 0 0; }
        .seccion { margin-bottom: 20px; border: 1px solid #e0e0e0; border-radius: 14px; overflow: hidden; }
        .seccion-header { background: #f8f9fa; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 600; }
        .seccion-body { padding: 16px; display: none; }
        .seccion-body.abierto { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 600px; }
        .login-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 30px; z-index: 3000; }
        .stats { padding: 10px 16px; background: #f8f9fa; font-size: 12px; text-align: center; }
        .tag { display: inline-block; background: #e0e0e0; padding: 3px 8px; border-radius: 16px; font-size: 10px; margin: 2px; }
        .tag-remove { margin-left: 5px; cursor: pointer; font-weight: bold; }
        .campo-editable { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .campo-label { font-weight: 600; min-width: 70px; }
        .campo-input { display: none; }
        .btn-editar-campo, .btn-guardar-campo { background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>🔐 CRM con Google Sheets</h2>
            <p>Inicia sesión con tu cuenta de Google para continuar.</p>
            <button id="btnLogin" class="btn-primary">Iniciar sesión</button>
        </div>
    </div>

    <div class="app-container" id="appContainer" style="display: none;">
        <div class="header">
            <h1>🏢 CRM Profesional (Google Sheets)</h1>
            <p>Gestión completa</p>
            <div class="global-search">
                <input type="text" id="globalSearchInput" placeholder="🔍 Buscar...">
                <button onclick="busquedaGlobal()">Buscar</button>
            </div>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="cambiarPestana('empresas')">🏭 Empresas</button>
            <button class="nav-tab" onclick="cambiarPestana('contactos')">👥 Contactos</button>
            <button class="nav-tab" onclick="cambiarPestana('interacciones')">💬 Interacciones</button>
        </div>
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="btn-primary" id="btnAgregar">+ Nueva Empresa</button>
                <button class="btn-outline" onclick="importarExcelCompleto()">📊 Importar Excel</button>
            </div>
            <div class="toolbar-right">
                <select id="sortBy" onchange="cambiarOrden()">
                    <option value="nombre_asc">Nombre A-Z</option>
                    <option value="nombre_desc">Nombre Z-A</option>
                </select>
                <button class="btn-outline" onclick="exportarExcel()">📊 Exportar Excel</button>
                <button class="btn-outline" onclick="exportarPDF()">📄 PDF</button>
                <button class="btn-outline" onclick="mostrarCalendario()">📅 Calendario</button>
            </div>
        </div>
        <div id="filtrosInteracciones" style="display: none; padding: 12px;">
            <select id="filtroTipo"><option value="todos">Todos</option><option value="reunion">Reunión</option><option value="llamada">Llamada</option></select>
            <select id="filtroEstado"><option value="todos">Todos</option><option value="pendiente">Pendiente</option><option value="completada">Completada</option></select>
            <select id="filtroContacto"><option value="todos">Todos</option></select>
            <input type="text" id="filtroBusquedaInteraccion" placeholder="Buscar...">
            <button class="btn-secondary" onclick="limpiarFiltrosInteracciones()">Limpiar</button>
        </div>
        <div id="contentContainer" class="interacciones-list-container" style="display: none;"></div>
        <div id="contentGridContainer" class="grid-container"></div>
        <div class="stats" id="stats"></div>
    </div>

    <!-- Modales necesarios (simplificados) -->
    <div id="modalCrearEmpresa" class="modal"><div class="modal-content"><h2>Nueva Empresa</h2><form id="formCrearEmpresa"><input type="text" id="newEmpNombre" placeholder="Nombre" required><select id="newEmpTipo"><option value="fabricante">Fabricante</option><option value="distribuidor">Distribuidor</option><option value="proveedor">Proveedor</option></select><button type="submit">Crear</button><button type="button" onclick="cerrarModal('modalCrearEmpresa')">Cancelar</button></form></div></div>
    <div id="modalConfirmacion" class="modal"><div class="modal-content"><h2>Confirmar</h2><p id="confirmacionMensaje"></p><button id="confirmacionAceptar">Eliminar</button><button onclick="cerrarConfirmacion()">Cancelar</button></div></div>
    <div id="fichaEmpresa" class="ficha-overlay"><div class="ficha-container"><div class="ficha-header"><h2 id="fichaEmpNombre"></h2><button onclick="cerrarFichaEmpresa()">Cerrar</button></div><div class="ficha-body" id="fichaEmpBody"></div></div></div>
    <div id="fichaContacto" class="ficha-overlay"><div class="ficha-container"><div class="ficha-header"><h2 id="fichaContNombre"></h2><button onclick="cerrarFichaContacto()">Cerrar</button></div><div class="ficha-body" id="fichaContBody"></div></div></div>
    <div id="fichaInteraccion" class="ficha-overlay"><div class="ficha-container"><div class="ficha-header"><h2 id="fichaInterTitulo"></h2><button onclick="cerrarFichaInteraccion()">Cerrar</button></div><div class="ficha-body" id="fichaInterBody"></div></div></div>

    <script>
        // ============ CONFIGURACIÓN ============
        const CLIENT_ID = '547525985243-8vmjbnm9537snsukt4aijcd70ld5k6f6.apps.googleusercontent.com';
        const SPREADSHEET_ID = '1JIKDd8aCZd6wjQHwAqRqUR8vrVI0EgIkHzafcPtOyuc';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

        let authInstance = null;
        let empresas = [], contactos = [], interacciones = [], relaciones = [], documentos = [];
        let currentPestana = 'empresas', currentSort = 'nombre_asc';

        // Inicializar gapi
        function initClient() {
            gapi.load('client:auth2', () => {
                gapi.client.init({
                    clientId: CLIENT_ID,
                    scope: SCOPES,
                    discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4']
                }).then(() => {
                    authInstance = gapi.auth2.getAuthInstance();
                    authInstance.isSignedIn.listen(updateSigninStatus);
                    if (authInstance.isSignedIn.get()) {
                        updateSigninStatus(true);
                    } else {
                        document.getElementById('loginOverlay').style.display = 'flex';
                    }
                }).catch(err => {
                    console.error('Error init:', err);
                    document.getElementById('loginOverlay').innerHTML = '<div class="login-card"><h2>Error</h2><p>No se pudo inicializar. Revisa consola.</p></div>';
                });
            });
        }

        function updateSigninStatus(isSigned) {
            if (isSigned) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appContainer').style.display = 'block';
                cargarDatos();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
            }
        }

        document.getElementById('btnLogin').addEventListener('click', () => {
            authInstance.signIn();
        });

        // Funciones de Sheets (sin autenticación manual)
        async function obtenerCabeceras(hoja) {
            const res = await gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: SPREADSHEET_ID,
                range: `${hoja}!A1:Z1`
            });
            return res.result.values ? res.result.values[0] : [];
        }

        async function obtenerTodos(hoja) {
            const headers = await obtenerCabeceras(hoja);
            if (!headers.length) return [];
            const res = await gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: SPREADSHEET_ID,
                range: `${hoja}!A2:Z`
            });
            const rows = res.result.values || [];
            return rows.map(row => {
                let obj = {};
                headers.forEach((h, i) => {
                    let val = row[i] || '';
                    if (h === 'id') val = val ? Number(val) : null;
                    if (h === 'tags') val = val ? val.split(',').map(t=>t.trim()) : [];
                    obj[h] = val;
                });
                return obj;
            });
        }

        async function guardarEnSheet(hoja, obj, id=null) {
            const headers = await obtenerCabeceras(hoja);
            let newId = id;
            if (!newId) {
                const todos = await obtenerTodos(hoja);
                const maxId = todos.reduce((m,item)=>Math.max(m, item.id||0),0);
                newId = maxId + 1;
                obj.id = newId;
            } else obj.id = id;
            const row = headers.map(h => {
                let v = obj[h];
                if (Array.isArray(v)) v = v.join(', ');
                return v !== undefined ? v : '';
            });
            // Buscar si ya existe
            const idsRes = await gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: SPREADSHEET_ID,
                range: `${hoja}!A:A`
            });
            const ids = idsRes.result.values || [];
            let rowIdx = -1;
            for (let i=0; i<ids.length; i++) if (Number(ids[i][0]) === newId) { rowIdx = i+2; break; }
            if (rowIdx === -1) {
                await gapi.client.sheets.spreadsheets.values.append({
                    spreadsheetId: SPREADSHEET_ID,
                    range: `${hoja}!A:A`,
                    valueInputOption: 'RAW',
                    insertDataOption: 'INSERT_ROWS',
                    resource: { values: [row] }
                });
            } else {
                const endCol = String.fromCharCode(65 + headers.length -1);
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: SPREADSHEET_ID,
                    range: `${hoja}!A${rowIdx}:${endCol}${rowIdx}`,
                    valueInputOption: 'RAW',
                    resource: { values: [row] }
                });
            }
            return newId;
        }

        async function eliminarDeSheet(hoja, id) {
            // Obtener sheetId
            const sheetMeta = await gapi.client.sheets.spreadsheets.get({
                spreadsheetId: SPREADSHEET_ID,
                fields: 'sheets.properties'
            });
            const sheet = sheetMeta.result.sheets.find(s => s.properties.title === hoja);
            const sheetIdNum = sheet.properties.sheetId;
            const idsRes = await gapi.client.sheets.spreadsheets.values.get({
                spreadsheetId: SPREADSHEET_ID,
                range: `${hoja}!A:A`
            });
            const ids = idsRes.result.values || [];
            let rowIdx = -1;
            for (let i=0; i<ids.length; i++) if (Number(ids[i][0]) === id) { rowIdx = i+1; break; }
            if (rowIdx !== -1) {
                await gapi.client.sheets.spreadsheets.batchUpdate({
                    spreadsheetId: SPREADSHEET_ID,
                    resource: {
                        requests: [{
                            deleteDimension: {
                                range: { sheetId: sheetIdNum, dimension: "ROWS", startIndex: rowIdx-1, endIndex: rowIdx }
                            }
                        }]
                    }
                });
            }
        }

        // Wrappers
        async function guardarEmpresa(e,id=null) { return guardarEnSheet('Empresas',e,id); }
        async function eliminarEmpresa(id) { return eliminarDeSheet('Empresas',id); }
        async function guardarContacto(c,id=null) { return guardarEnSheet('Contactos',c,id); }
        async function eliminarContacto(id) { return eliminarDeSheet('Contactos',id); }
        async function guardarInteraccion(i,id=null) { return guardarEnSheet('Interacciones',i,id); }
        async function eliminarInteraccion(id) { return eliminarDeSheet('Interacciones',id); }

        async function cargarDatos() {
            empresas = await obtenerTodos('Empresas');
            contactos = await obtenerTodos('Contactos');
            interacciones = await obtenerTodos('Interacciones');
            relaciones = await obtenerTodos('Relaciones');
            documentos = await obtenerTodos('Documentos');
            renderizarSegunPestana();
            actualizarContador();
        }

        // Renderizado básico (similar al original, resumido)
        function renderizarEmpresas() {
            const container = document.getElementById('contentGridContainer');
            container.style.display = 'grid';
            document.getElementById('contentContainer').style.display = 'none';
            container.innerHTML = empresas.map(emp => `<div class="card" onclick="abrirFichaEmpresa(${emp.id})"><div>${emp.nombre}</div><div>${emp.tipo}</div></div>`).join('');
        }
        function renderizarContactos() {
            const container = document.getElementById('contentGridContainer');
            container.style.display = 'grid';
            document.getElementById('contentContainer').style.display = 'none';
            container.innerHTML = contactos.map(cont => `<div class="card" onclick="abrirFichaContacto(${cont.id})"><div>${cont.nombre}</div><div>${cont.cargo}</div></div>`).join('');
        }
        function renderizarInteracciones() { /* similar */ }
        function cambiarPestana(p) { currentPestana = p; renderizarSegunPestana(); }
        function renderizarSegunPestana() {
            if (currentPestana === 'empresas') renderizarEmpresas();
            else if (currentPestana === 'contactos') renderizarContactos();
            else renderizarInteracciones();
        }
        function actualizarContador() { document.getElementById('stats').innerHTML = `${empresas.length} empresas, ${contactos.length} contactos`; }
        function cerrarModal(id) { document.getElementById(id).style.display = 'none'; }
        function cerrarConfirmacion() { document.getElementById('modalConfirmacion').style.display = 'none'; }
        function mostrarToast(m) { let t=document.createElement('div'); t.className='toast'; t.textContent=m; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
        function exportarExcel() { alert('Función exportar Excel'); }
        function exportarPDF() { alert('Función exportar PDF'); }
        function mostrarCalendario() { alert('Calendario'); }
        function importarExcelCompleto() { alert('Importar Excel'); }
        function busquedaGlobal() { alert('Búsqueda'); }
        function limpiarFiltrosInteracciones() { }
        function cambiarOrden() { }
        // Fichas mínimas
        async function abrirFichaEmpresa(id) { /* implementar */ }
        async function abrirFichaContacto(id) { /* implementar */ }
        async function abrirFichaInteraccion(id) { /* implementar */ }
        function cerrarFichaEmpresa() { document.getElementById('fichaEmpresa').style.display = 'none'; }
        function cerrarFichaContacto() { document.getElementById('fichaContacto').style.display = 'none'; }
        function cerrarFichaInteraccion() { document.getElementById('fichaInteraccion').style.display = 'none'; }
        // Botón agregar
        document.getElementById('btnAgregar').onclick = () => {
            if (currentPestana === 'empresas') document.getElementById('modalCrearEmpresa').style.display = 'flex';
        };
        document.getElementById('formCrearEmpresa').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nueva = {
                nombre: document.getElementById('newEmpNombre').value,
                tipo: document.getElementById('newEmpTipo').value,
                estado: 'activo',
                fecha_creacion: new Date().toISOString()
            };
            await guardarEmpresa(nueva);
            await cargarDatos();
            cerrarModal('modalCrearEmpresa');
            mostrarToast('Empresa creada');
        });

        // Iniciar
        const script = document.createElement('script');
        script.src = 'https://apis.google.com/js/api.js';
        script.onload = initClient;
        document.head.appendChild(script);
    </script>
</body>
</html>
